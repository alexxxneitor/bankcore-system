name: Run Tests for BankCore System

on:
  pull_request:
    branches:
      - "**"

jobs:

  customers-service:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.8
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_BANKCORE }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_BANKCORE }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_BANKCORE_CUSTOMERS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ms-customers

    env:
      DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGRES_DB_BANKCORE_CUSTOMERS }}
      DB_USERNAME: ${{ secrets.POSTGRES_USER_BANKCORE }}
      DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_BANKCORE }}

    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            java-version: "17"
            distribution: "temurin"
            cache: maven

        - name: Grant execute permissions to Maven wrapper
          run: chmod +x mvnw

        - name: Run tests and generate coverage report
          run: ./mvnw clean test jacoco:report 

        - name: Upload JaCoCo coverage report
          uses: actions/upload-artifact@v4
          with:
            name: jacoco-report
            path: target/site/jacoco/

  accounts-service:
    runs-on: ubuntu-latest
    needs: customers-service

    services:
      postgres:
        image: postgres:17.8
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_BANKCORE }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_BANKCORE }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB_BANKCORE_ACCOUNTS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ms-accounts

    env:
      DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGRES_DB_BANKCORE_ACCOUNTS }}
      DB_USERNAME: ${{ secrets.POSTGRES_USER_BANKCORE }}
      DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_BANKCORE }}

    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            java-version: "17"
            distribution: "temurin"
            cache: maven

        - name: Grant execute permissions to Maven wrapper
          run: chmod +x mvnw

        - name: Run tests and generate coverage report
          run: ./mvnw clean test jacoco:report 

        - name: Upload JaCoCo coverage report
          uses: actions/upload-artifact@v4
          with:
            name: jacoco-report
            path: target/site/jacoco/