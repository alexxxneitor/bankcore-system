name: Run Tests for BankCore System

on:
  pull_request:
    branches:
      - "**"

jobs:

  customers-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ms-customers

    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Verify Docker
          run: docker --version

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            java-version: "17"
            distribution: "temurin"
            cache: maven

        - name: Run tests and generate coverage report
          run: mvn -B clean verify

        - name: Upload JaCoCo coverage report
          uses: actions/upload-artifact@v4
          with:
            name: jacoco-report
            path: ms-customers/target/site/jacoco/

  accounts-service:
    runs-on: ubuntu-latest
    needs: customers-service

    defaults:
      run:
        working-directory: ms-accounts

    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Verify Docker
          run: docker --version

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            java-version: "17"
            distribution: "temurin"
            cache: maven

        - name: Run tests and generate coverage report
          run: mvn -B clean verify

        - name: Upload JaCoCo coverage report
          uses: actions/upload-artifact@v4
          with:
            name: jacoco-report
            path: ms-accounts/target/site/jacoco/