name: Docker Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-customers:
    name: Build ms-customers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push ms-customers
        uses: docker/build-push-action@v6
        with:
          context: ./ms-customers
          file: ./ms-customers/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ms-customers:latest
            ${{ env.IMAGE_PREFIX }}/ms-customers:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_VERSION=${{ steps.vars.outputs.short_sha }}
            IMAGE_DESCRIPTION=Microservice responsible for client management and validations consumed by ms-accounts

  build-accounts:
    name: Build ms-accounts
    runs-on: ubuntu-latest
    needs: build-customers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push ms-accounts
        uses: docker/build-push-action@v6
        with:
          context: ./ms-accounts
          file: ./ms-accounts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ms-accounts:latest
            ${{ env.IMAGE_PREFIX }}/ms-accounts:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_VERSION=${{ steps.vars.outputs.short_sha }}
            IMAGE_DESCRIPTION=Microservice in charge of account management