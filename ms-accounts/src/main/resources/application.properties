spring.application.name=ms-accounts
server.port=8082
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.url=${SPRING_DATASOURCE_URL_ACCOUNTS}
spring.datasource.username=${BANKCORESYTEM_DATASOURCE_USERNAME}
spring.datasource.password=${BANKCORESYTEM_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
