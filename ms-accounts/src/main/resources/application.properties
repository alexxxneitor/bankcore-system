# Configuración General de la Aplicación
spring.application.name=ms-accounts
server.port=8082
spring.config.import=optional:file:.env[.properties]

# Configuración de Base de Datos (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL_ACCOUNTS}
spring.datasource.username=${BANKCORESYSTEM_DATASOURCE_USERNAME}
spring.datasource.password=${BANKCORESYSTEM_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Configuración de Documentación (Swagger / OpenAPI)
springdoc.api-docs.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.api-docs.version=OPENAPI_3_0

# Seguridad (JWT Resource Server)
spring.security.oauth2.resourceserver.jwt.secret-key=${BANKCORESYSTEM_SECRET_KEY}

# Configuración de Jackson
spring.jackson.mapper.accept-case-insensitive-enums=true

# Integración con Microservicios
ms-customers.url=${CUSTOMER_SERVICE_URL}

# Configuración de CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS}
app.cors.max-age=${CORS_MAX_AGE}

# Configuración de Límites de Retiro
accounts.withdrawal.limits.savings=${BANKCORESYSTEM_LIMIT_SAVINGS}
accounts.withdrawal.limits.checking=${BANKCORESYSTEM_LIMIT_CHECKING}
