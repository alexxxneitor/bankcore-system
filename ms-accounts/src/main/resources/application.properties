spring.application.name=ms-accounts
server.port=8082
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.url=${SPRING_DATASOURCE_URL_ACCOUNTS}
spring.datasource.username=${BANKCORESYSTEM_DATASOURCE_USERNAME}
spring.datasource.password=${BANKCORESYSTEM_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.security.oauth2.resourceserver.jwt.secret-key=${BANKCORESYSTEM_SECRET_KEY}

spring.jackson.mapper.accept-case-insensitive-enums=true

ms-customers.url=${CUSTOMER_SERVICE_URL}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS}
app.cors.max-age=${CORS_MAX_AGE}

accounts.withdrawal.limits.savings=${BANKCORESYSTEM_LIMIT_SAVINGS}
accounts.withdrawal.limits.checking=${BANKCORESYSTEM_LIMIT_CHECKING}
