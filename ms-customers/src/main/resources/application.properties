# Configuración General de la Aplicación
spring.application.name=ms-customers
server.port=${SERVER_PORT_CUSTOMERS:8081}
spring.config.import=optional:file:.env[.properties]

# Configuración de Base de Datos (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL_CUSTOMERS}
spring.datasource.username=${BANKCORESYSTEM_DATASOURCE_USERNAME}
spring.datasource.password=${BANKCORESYSTEM_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto={JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Configuración de Documentación (Swagger / OpenAPI)
springdoc.api-docs.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_DOCUMENTATION_ENABLED:false}
springdoc.api-docs.version=OPENAPI_3_0

# Configuración de CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS}
app.cors.max-age=${CORS_MAX_AGE}

# Configuración de Seguridad (JWT)
app.jwt.secret=${BANKCORESYSTEM_SECRET_KEY}