services:
  postgres-datasource:
    image: postgres:17.8
    container_name: postgres-datasource
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${BANKCORESYTEM_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${BANKCORESYTEM_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./bankcore-system-data:/var/lib/postgresql/data
      - ./init-multiple-db.sh:/docker-entrypoint-initdb.d/init-multiple-db.sh
    restart: always

  ms-customers:
    build:
      context: ./ms-customers
    container_name: ms-customers
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      - postgres-datasource
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL_CUSTOMERS: jdbc:postgresql://postgres-datasource:5432/${DATASOURCE_DB_NAME_CUSTOMERS}
      SPRING_DATASOURCE_USERNAME: ${BANKCORESYTEM_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BANKCORESYTEM_DATASOURCE_PASSWORD}
    restart: on-failure

  ms-accounts:
    build:
      context: ./ms-accounts
    container_name: ms-accounts
    env_file:
      - .env
    ports:
      - "8082:8082"
    depends_on:
      - postgres-datasource
      - ms-customers
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL_ACCOUNTS: jdbc:postgresql://postgres-datasource:5432/${DATASOURCE_DB_NAME_ACCOUNTS}
      SPRING_DATASOURCE_USERNAME: ${BANKCORESYTEM_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${BANKCORESYTEM_DATASOURCE_PASSWORD}
      CUSTOMERS_SERVICE_URL: http://ms-customers:8081
    restart: on-failure
