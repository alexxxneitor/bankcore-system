services:
  ms-customers:
    build:
      context: ./ms-customers
    container_name: ms-customers
    ports:
      - "8081:8081"
    depends_on:
      - postgres-customers
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-customers:5432/customers_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    restart: on-failure

  ms-accounts:
    build:
      context: ./ms-accounts
    container_name: ms-accounts
    ports:
      - "8082:8082"
    depends_on:
      - postgres-accounts
      - ms-customers
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-accounts:5432/accounts_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      CUSTOMERS_SERVICE_URL: http://ms-customers:8081
    restart: on-failure

  postgres-customers:
    image: postgres:17.8
    container_name: postgres-customers
    environment:
      POSTGRES_DB: customers_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - customers_data:/var/lib/postgresql/data
    restart: always

  postgres-accounts:
    image: postgres:17.8
    container_name: postgres-accounts
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - accounts_data:/var/lib/postgresql/data
    restart: always

volumes:
  customers_data:
  accounts_data:
